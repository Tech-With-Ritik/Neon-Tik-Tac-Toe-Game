<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Tic Tac Toe</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">

<link rel="icon" type="image/png" sizes="16x16" href="media/Favicon icon/favicon-16x16.png">

<link rel="icon" type="image/png" sizes="32x32" href="media/Favicon icon/favicon-32x32.png">

<link rel="apple-touch-icon" sizes="180x180" href="media/Favicon icon/apple-touch-icon.png">

<link rel="icon" type="image/png" sizes="192x192" href="media/Favicon icon/android-chrome-192x192.png">

<link rel="icon" type="image/png" sizes="512x512" href="media/Favicon icon/android-chrome-512x512.png">

<link rel="manifest" href="media/Favicon icon/site.webmanifest">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container" id="mode-selection">
    <h1>Select Game Mode</h1>
    <button id="player-vs-player">Player vs Player</button>
    <button id="player-vs-ai">Player vs Computer</button>
    <div id="ai-difficulty-selection" style="display: none; margin-top: 16px;">
      <h2>Choose AI Difficulty</h2>
      <button id="difficulty-easy">Easy</button>
      <button id="difficulty-medium">Medium</button>
      <button id="difficulty-hard">Hard</button>
    </div>
  </div>

  <div class="container" id="game-container" style="display: none;">
    <h1>Neon Tic Tac Toe</h1>
    <div id="game-board">
      <div class="cell" data-index="0"></div>
      <div class="cell" data-index="1"></div>
      <div class="cell" data-index="2"></div>
      <div class="cell" data-index="3"></div>
      <div class="cell" data-index="4"></div>
      <div class="cell" data-index="5"></div>
      <div class="cell" data-index="6"></div>
      <div class="cell" data-index="7"></div>
      <div class="cell" data-index="8"></div>
    </div>
    <p id="status">Player X's Turn</p>
    <button id="reset-btn">Restart Game</button>
    <button id="back-btn" style="margin-left: 10px;">Back</button>

    <!-- Sound Effects -->
    <audio id="click-x-sound" src="media/click-x.mp3"></audio>
    <audio id="click-o-sound" src="media/click-o.mp3"></audio>
    <audio id="win-sound" src="media/win-sound.mp3"></audio>
  </div>
  <script src="script.js"></script>
</body>
</html>
